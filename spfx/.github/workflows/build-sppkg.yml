name: Build COSF Intranet .sppkg

on:
  push:
    branches: [ main, master ]
    paths:
      - 'SharePoint-Template/spfx/**'
  workflow_dispatch:

jobs:
  build:
    name: Build SPFx Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: SharePoint-Template/spfx/package-lock.json

      - name: Install dependencies
        working-directory: SharePoint-Template/spfx
        run: npm ci --legacy-peer-deps

      - name: Bundle (production)
        working-directory: SharePoint-Template/spfx
        run: gulp bundle --ship

      - name: Package solution
        working-directory: SharePoint-Template/spfx
        run: gulp package-solution --ship

      - name: Upload .sppkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosf-intranet-sppkg
          path: SharePoint-Template/spfx/sharepoint/solution/cosf-intranet.sppkg
          retention-days: 30

      - name: Build summary
        run: |
          echo "## ✅ COSF Intranet Portal Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** \`cosf-intranet.sppkg\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install Instructions" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the \`cosf-intranet-sppkg\` artifact above" >> $GITHUB_STEP_SUMMARY
          echo "2. Go to SharePoint Admin Center → More Features → Apps → App Catalog" >> $GITHUB_STEP_SUMMARY
          echo "3. Upload \`cosf-intranet.sppkg\` → check **Make this solution available to all sites** → Deploy" >> $GITHUB_STEP_SUMMARY
          echo "4. On your intranet site → Settings → Add an app → COSF Intranet Portal" >> $GITHUB_STEP_SUMMARY
          echo "5. Edit the home page → Add web part → search 'COSF Intranet Portal' → save" >> $GITHUB_STEP_SUMMARY
